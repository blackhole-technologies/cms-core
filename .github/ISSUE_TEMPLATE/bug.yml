name: Bug report
description: Report a defect or unexpected behavior.
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `npm start`
        2. Visit /admin/...
        3. Click ...
        4. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: cms-core version or commit hash
      placeholder: 0.1.0 or abc1234
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: v22.10.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 14.6 / Ubuntu 24.04 / Windows 11 (WSL)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / stack traces
      render: shell
