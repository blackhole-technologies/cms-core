
<!DOCTYPE html>
<html>
<head>
  <title>Accordion Formatter Test</title>
  <meta charset="utf-8">
</head>
<body>
  <h1>Accordion Formatter Test</h1>
  <div class="field-group field-group-accordion field-group-accordion-single field-group-test_accordion custom-accordion" id="fieldgroup-test_accordion" data-collapse-mode="single">
  <div class="field-group-accordion-section" id="accordion-test_accordion-section-0" data-index="0">
    <button
      type="button"
      id="accordion-test_accordion-header-0"
      class="field-group-accordion-header field-group-accordion-header-open"
      aria-expanded="true"
      aria-controls="accordion-test_accordion-panel-0"
    >
      <span class="field-group-accordion-label">field_title</span>
      <span class="field-group-accordion-icon" aria-hidden="true">−</span>
    </button>
    <div
      id="accordion-test_accordion-panel-0"
      class="field-group-accordion-panel field-group-accordion-panel-open"
      aria-labelledby="accordion-test_accordion-header-0"
      
      style="max-height: 10000px"
    >
      <div class="field-group-accordion-content">
        <div class="field field-title"><label>Title</label><input type="text" value="Test Article" /></div>
      </div>
    </div>
  </div>
  <div class="field-group-accordion-section" id="accordion-test_accordion-section-1" data-index="1">
    <button
      type="button"
      id="accordion-test_accordion-header-1"
      class="field-group-accordion-header"
      aria-expanded="false"
      aria-controls="accordion-test_accordion-panel-1"
    >
      <span class="field-group-accordion-label">field_body</span>
      <span class="field-group-accordion-icon" aria-hidden="true">+</span>
    </button>
    <div
      id="accordion-test_accordion-panel-1"
      class="field-group-accordion-panel"
      aria-labelledby="accordion-test_accordion-header-1"
      hidden
      style="max-height: 0"
    >
      <div class="field-group-accordion-content">
        <div class="field field-body"><label>Body</label><textarea>This is the body content</textarea></div>
      </div>
    </div>
  </div>
  <div class="field-group-accordion-section" id="accordion-test_accordion-section-2" data-index="2">
    <button
      type="button"
      id="accordion-test_accordion-header-2"
      class="field-group-accordion-header"
      aria-expanded="false"
      aria-controls="accordion-test_accordion-panel-2"
    >
      <span class="field-group-accordion-label">field_tags</span>
      <span class="field-group-accordion-icon" aria-hidden="true">+</span>
    </button>
    <div
      id="accordion-test_accordion-panel-2"
      class="field-group-accordion-panel"
      aria-labelledby="accordion-test_accordion-header-2"
      hidden
      style="max-height: 0"
    >
      <div class="field-group-accordion-content">
        <div class="field field-tags"><label>Tags</label><input type="text" value="test, demo" /></div>
      </div>
    </div>
  </div>
</div>

<style>
.field-group-accordion {
  border: 1px solid #ddd;
  border-radius: 4px;
  overflow: hidden;
}

.field-group-accordion-section {
  border-bottom: 1px solid #ddd;
}

.field-group-accordion-section:last-child {
  border-bottom: none;
}

.field-group-accordion-header {
  width: 100%;
  padding: 1rem;
  background: #f5f5f5;
  border: none;
  text-align: left;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 1rem;
  font-weight: 500;
  transition: background-color 0.2s ease;
}

.field-group-accordion-header:hover {
  background: #e8e8e8;
}

.field-group-accordion-header:focus {
  outline: 2px solid #0066cc;
  outline-offset: -2px;
}

.field-group-accordion-header-open {
  background: #e8e8e8;
}

.field-group-accordion-icon {
  font-size: 1.25rem;
  font-weight: bold;
  color: #666;
  transition: transform 0.3s ease;
}

.field-group-accordion-header-open .field-group-accordion-icon {
  transform: rotate(90deg);
}

.field-group-accordion-panel {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out;
  opacity: 0;
}

.field-group-accordion-panel-open {
  max-height: 10000px;
  opacity: 1;
}

.field-group-accordion-content {
  padding: 1rem;
}
</style>

<script>
(function() {
  const container = document.getElementById('fieldgroup-test_accordion');
  if (!container) return;

  const headers = Array.from(container.querySelectorAll('.field-group-accordion-header'));
  const panels = Array.from(container.querySelectorAll('.field-group-accordion-panel'));
  const mode = 'single';

  // Toggle a specific section
  function toggleSection(index, forceOpen = null) {
    const header = headers[index];
    const panel = panels[index];
    const icon = header.querySelector('.field-group-accordion-icon');

    if (!header || !panel) return;

    const isCurrentlyOpen = header.getAttribute('aria-expanded') === 'true';
    const shouldOpen = forceOpen !== null ? forceOpen : !isCurrentlyOpen;

    // In single mode, close all other sections first
    if (mode === 'single' && shouldOpen) {
      headers.forEach((h, i) => {
        if (i !== index) {
          h.setAttribute('aria-expanded', 'false');
          h.classList.remove('field-group-accordion-header-open');
          panels[i].classList.remove('field-group-accordion-panel-open');
          panels[i].hidden = true;
          panels[i].style.maxHeight = '0';
          const otherIcon = h.querySelector('.field-group-accordion-icon');
          if (otherIcon) otherIcon.textContent = '+';
        }
      });
    }

    // Toggle current section
    header.setAttribute('aria-expanded', shouldOpen);
    header.classList.toggle('field-group-accordion-header-open', shouldOpen);
    panel.classList.toggle('field-group-accordion-panel-open', shouldOpen);
    panel.hidden = !shouldOpen;
    panel.style.maxHeight = shouldOpen ? '10000px' : '0';

    if (icon) {
      icon.textContent = shouldOpen ? '−' : '+';
    }
  }

  // Click handlers
  headers.forEach((header, index) => {
    header.addEventListener('click', (e) => {
      e.preventDefault();
      toggleSection(index);
    });
  });

  // Keyboard navigation
  container.addEventListener('keydown', (e) => {
    const currentIndex = headers.findIndex(h => h === document.activeElement);
    if (currentIndex === -1) return;

    let newIndex = currentIndex;
    let handled = false;

    if (e.key === 'ArrowDown') {
      e.preventDefault();
      newIndex = (currentIndex + 1) % headers.length;
      handled = true;
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      newIndex = (currentIndex - 1 + headers.length) % headers.length;
      handled = true;
    } else if (e.key === 'Home') {
      e.preventDefault();
      newIndex = 0;
      handled = true;
    } else if (e.key === 'End') {
      e.preventDefault();
      newIndex = headers.length - 1;
      handled = true;
    } else if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      toggleSection(currentIndex);
      return;
    }

    if (handled && headers[newIndex]) {
      headers[newIndex].focus();
    }
  });
})();
</script>

</body>
</html>
