
<!DOCTYPE html>
<html>
<head>
  <title>Details Formatter Test</title>
  <meta charset="utf-8">
</head>
<body>
  <h1>Details Formatter Test</h1>
  <details class="field-group field-group-details field-group-test_details custom-details" id="fieldgroup-test_details" open>
  <summary class="field-group-summary custom-summary">Test Details</summary>
  <div class="field-group-description">This is a collapsible details section</div>
  <div class="field-group-fields">
    <div class="field field-email"><label>Email</label><input type="email" value="test@example.com" /></div>
    <div class="field field-phone"><label>Phone</label><input type="tel" value="555-1234" /></div>
    <div class="field field-address"><label>Address</label><textarea>123 Main St</textarea></div>
  </div>
</details>

<style>
.field-group-details {
  border: 1px solid #ddd;
  border-radius: 4px;
  margin-bottom: 1rem;
  overflow: hidden;
}

.field-group-summary {
  padding: 0.75rem 1rem;
  background: #f5f5f5;
  cursor: pointer;
  font-weight: 500;
  user-select: none;
  transition: background-color 0.2s ease;
}

.field-group-summary:hover {
  background: #e8e8e8;
}

.field-group-summary:focus {
  outline: 2px solid #0066cc;
  outline-offset: -2px;
}

/* Style for the disclosure triangle */
.field-group-summary::marker {
  color: #666;
}

.field-group-description {
  padding: 0.5rem 1rem;
  background: #f9f9f9;
  border-bottom: 1px solid #eee;
  font-size: 0.9rem;
  color: #666;
}

.field-group-fields {
  padding: 1rem;
}

/* Smooth animation for opening (browser support varies) */
@media (prefers-reduced-motion: no-preference) {
  details .field-group-fields {
    animation: slideDown 0.3s ease-out;
  }
}

@keyframes slideDown {
  from {
    opacity: 0;
    transform: translateY(-10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>

</body>
</html>
