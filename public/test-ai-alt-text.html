<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test AI Alt Text Generation</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
    }
    h1 { color: #333; }
    .test-section {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      margin: 20px 0;
      background: #f9f9f9;
    }
    button {
      padding: 10px 20px;
      background: #0071b9;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #005a94; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .result {
      margin-top: 15px;
      padding: 15px;
      background: white;
      border-radius: 4px;
      border: 1px solid #ddd;
    }
    .success { border-color: #4caf50; background: #f0f9f0; }
    .error { border-color: #f44336; background: #fff5f5; }
    input[type="file"] { margin: 10px 0; }
    textarea {
      width: 100%;
      min-height: 80px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-family: inherit;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <h1>🤖 AI Alt Text Generation Test</h1>
  <p>Test the AI-powered alt text generation features</p>

  <!-- Test 1: Generate Alt Text from Image -->
  <div class="test-section">
    <h2>Feature 1 & 2: Generate Alt Text</h2>
    <p>Upload an image to generate alt text using AI</p>
    <input type="file" id="imageFile" accept="image/*">
    <br>
    <button onclick="testGenerate()">✨ Generate Alt Text</button>
    <div id="generateResult" class="result" style="display:none;"></div>
  </div>

  <!-- Test 2: Score Alt Text Quality -->
  <div class="test-section">
    <h2>Feature 4: Score Alt Text Quality</h2>
    <p>Enter alt text to get a quality score and feedback</p>
    <textarea id="altTextInput" placeholder="Enter alt text to score..."></textarea>
    <br>
    <button onclick="testScore()">📊 Score Quality</button>
    <div id="scoreResult" class="result" style="display:none;"></div>
  </div>

  <script>
    async function testGenerate() {
      const fileInput = document.getElementById('imageFile');
      const resultDiv = document.getElementById('generateResult');

      if (!fileInput.files || !fileInput.files[0]) {
        alert('Please select an image file');
        return;
      }

      const formData = new FormData();
      formData.append('file', fileInput.files[0]);

      resultDiv.style.display = 'block';
      resultDiv.className = 'result';
      resultDiv.innerHTML = '⏳ Generating alt text...';

      try {
        const response = await fetch('/api/ai/alt-text/generate', {
          method: 'POST',
          body: formData
        });

        const responseData = await response.json();

        if (response.ok) {
          const data = responseData.data || responseData; // Support both formats
          resultDiv.className = 'result success';
          resultDiv.innerHTML = `
            <strong>✅ Success!</strong><br><br>
            <strong>Alt Text:</strong> ${data.text || data.altText}<br>
            <strong>Confidence:</strong> ${((data.confidence || 0.9) * 100).toFixed(1)}%<br>
            <strong>Provider:</strong> ${data.metadata?.provider || data.provider || 'Unknown'}<br>
            <strong>Quality Score:</strong> ${data.score || data.qualityScore}/100 (${data.metadata?.grade || data.qualityGrade || 'N/A'})<br>
            ${data.qualityFeedback && data.qualityFeedback.length > 0 ?
              '<br><strong>Feedback:</strong><br>' + data.qualityFeedback.map(f => '• ' + f).join('<br>') : ''}
          `;
        } else {
          throw new Error(responseData.error || responseData.message || 'Generation failed');
        }
      } catch (error) {
        resultDiv.className = 'result error';
        resultDiv.innerHTML = `<strong>❌ Error:</strong> ${error.message}`;
      }
    }

    async function testScore() {
      const input = document.getElementById('altTextInput');
      const resultDiv = document.getElementById('scoreResult');
      const altText = input.value.trim();

      if (!altText) {
        alert('Please enter alt text to score');
        return;
      }

      resultDiv.style.display = 'block';
      resultDiv.className = 'result';
      resultDiv.innerHTML = '⏳ Scoring...';

      try {
        const response = await fetch('/api/ai/alt-text/score', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ altText })
        });

        const data = await response.json();

        if (response.ok) {
          resultDiv.className = 'result success';
          resultDiv.innerHTML = `
            <strong>Score: ${data.score}/100</strong> (${data.grade})<br><br>
            <strong>Criteria Breakdown:</strong><br>
            • Length: ${data.criteria.length}/20<br>
            • Specificity: ${data.criteria.specificity}/20<br>
            • Clarity: ${data.criteria.clarity}/20<br>
            • Accessibility: ${data.criteria.accessibility}/20<br>
            • Technical: ${data.criteria.technical}/20<br>
            ${data.feedback && data.feedback.length > 0 ?
              '<br><strong>Feedback:</strong><br>' + data.feedback.map(f => '• ' + f).join('<br>') : ''}
          `;
        } else {
          throw new Error(data.error || 'Scoring failed');
        }
      } catch (error) {
        resultDiv.className = 'result error';
        resultDiv.innerHTML = `<strong>❌ Error:</strong> ${error.message}`;
      }
    }
  </script>
</body>
</html>
