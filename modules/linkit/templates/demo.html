<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linkit Demo - Link Autocomplete</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .search-box {
            position: relative;
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .filter-section {
            margin-bottom: 20px;
        }

        .filter-options {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }

        .checkbox-label input {
            cursor: pointer;
        }

        #results {
            margin-top: 20px;
        }

        .result-item {
            padding: 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 12px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .result-item:hover {
            border-color: #667eea;
            background: #f8f9ff;
            transform: translateX(4px);
        }

        .result-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .result-meta {
            display: flex;
            gap: 12px;
            font-size: 14px;
            color: #666;
            flex-wrap: wrap;
        }

        .result-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-content {
            background: #e3f2fd;
            color: #1976d2;
        }

        .badge-media {
            background: #fce4ec;
            color: #c2185b;
        }

        .badge-user {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .result-url {
            color: #888;
            font-size: 13px;
            font-family: monospace;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .stats {
            background: #f5f5f5;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #666;
            font-size: 14px;
        }

        code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }

        .api-info {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 16px;
            margin-top: 30px;
            border-radius: 4px;
        }

        .api-info h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .api-info p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 Linkit Demo</h1>
        <p class="subtitle">Link autocomplete with fuzzy search across content, media, and users</p>

        <div class="search-box">
            <label for="search">Search for content to link</label>
            <input
                type="text"
                id="search"
                placeholder="Start typing to search..."
                autocomplete="off"
            >
        </div>

        <div class="filter-section">
            <label>Filter by entity type:</label>
            <div class="filter-options">
                <label class="checkbox-label">
                    <input type="checkbox" name="type" value="content" checked>
                    Content
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" name="type" value="media" checked>
                    Media
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" name="type" value="user" checked>
                    Users
                </label>
            </div>
        </div>

        <div id="stats" class="stats" style="display: none;"></div>

        <div id="results"></div>

        <div class="api-info">
            <h3>API Endpoint</h3>
            <p><strong>GET</strong> <code>/api/linkit/autocomplete?q={query}&types={types}</code></p>
            <p><strong>Parameters:</strong></p>
            <ul style="margin-left: 20px; margin-top: 8px; color: #666;">
                <li><code>q</code> - Search query (minimum 2 characters)</li>
                <li><code>types</code> - Comma-separated entity types: content, media, user</li>
            </ul>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('search');
        const resultsDiv = document.getElementById('results');
        const statsDiv = document.getElementById('stats');
        const typeCheckboxes = document.querySelectorAll('input[name="type"]');

        let debounceTimer;

        // Debounced search function
        searchInput.addEventListener('input', (e) => {
            clearTimeout(debounceTimer);

            const query = e.target.value.trim();

            if (query.length < 2) {
                resultsDiv.innerHTML = '';
                statsDiv.style.display = 'none';
                return;
            }

            resultsDiv.innerHTML = '<div class="loading">Searching...</div>';
            statsDiv.style.display = 'none';

            debounceTimer = setTimeout(() => {
                performSearch(query);
            }, 300);
        });

        // Perform the search
        async function performSearch(query) {
            try {
                // Get selected types
                const selectedTypes = Array.from(typeCheckboxes)
                    .filter(cb => cb.checked)
                    .map(cb => cb.value);

                if (selectedTypes.length === 0) {
                    resultsDiv.innerHTML = '<div class="no-results">Please select at least one entity type</div>';
                    return;
                }

                const types = selectedTypes.join(',');
                const response = await fetch(`/api/linkit/autocomplete?q=${encodeURIComponent(query)}&types=${types}`);

                if (!response.ok) {
                    throw new Error('Search failed');
                }

                const results = await response.json();
                displayResults(results, query);
            } catch (error) {
                console.error('Search error:', error);
                resultsDiv.innerHTML = '<div class="no-results">Error performing search</div>';
            }
        }

        // Display search results
        function displayResults(results, query) {
            if (results.length === 0) {
                resultsDiv.innerHTML = '<div class="no-results">No results found</div>';
                statsDiv.style.display = 'none';
                return;
            }

            // Show stats
            statsDiv.textContent = `Found ${results.length} result${results.length === 1 ? '' : 's'} for "${query}"`;
            statsDiv.style.display = 'block';

            // Render results
            resultsDiv.innerHTML = results.map(result => {
                const badgeClass = `badge-${result.type}`;
                const entityLabel = result.entityType || result.type;

                return `
                    <div class="result-item" onclick="selectResult('${result.url}', '${escapeHtml(result.title)}')">
                        <div class="result-title">${highlightMatch(result.title, query)}</div>
                        <div class="result-meta">
                            <span class="result-badge ${badgeClass}">${result.type}</span>
                            <span class="result-badge ${badgeClass}">${entityLabel}</span>
                            <span class="result-url">${result.url}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Handle result selection
        function selectResult(url, title) {
            alert(`Selected: ${title}\nURL: ${url}\n\nIn a WYSIWYG editor, this would populate the link field.`);
        }

        // Highlight matching text
        function highlightMatch(text, query) {
            const regex = new RegExp(`(${escapeRegex(query)})`, 'gi');
            return escapeHtml(text).replace(regex, '<strong style="background: #ffeb3b; color: #000;">$1</strong>');
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Escape regex special characters
        function escapeRegex(str) {
            return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        // Re-search when filters change
        typeCheckboxes.forEach(checkbox => {
            checkbox.addEventListener('change', () => {
                const query = searchInput.value.trim();
                if (query.length >= 2) {
                    performSearch(query);
                }
            });
        });
    </script>
</body>
</html>
