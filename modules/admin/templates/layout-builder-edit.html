<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{pageTitle}} | Admin</title>
  <link rel="stylesheet" href="/css/admin.css">
  <style>
    .layout-editor {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 20px;
      margin: 20px 0;
    }
    @media (max-width: 900px) {
      .layout-editor {
        grid-template-columns: 1fr;
      }
    }
    .sections-panel {
      background: #f9f9f9;
      border-radius: 8px;
      padding: 20px;
    }
    .sidebar-panel {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
    }
    .section-card {
      background: white;
      border: 2px solid #ddd;
      border-radius: 8px;
      margin: 15px 0;
      overflow: hidden;
    }
    .section-header {
      background: #1976d2;
      color: white;
      padding: 12px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .section-header h3 {
      margin: 0;
      font-size: 1em;
    }
    .section-actions {
      display: flex;
      gap: 5px;
    }
    .section-actions button,
    .section-actions input[type="submit"] {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9em;
    }
    .section-actions button:hover,
    .section-actions input[type="submit"]:hover {
      background: rgba(255,255,255,0.3);
    }
    .section-body {
      padding: 15px;
    }
    .region-container {
      border: 1px dashed #ccc;
      border-radius: 4px;
      margin: 10px 0;
      min-height: 60px;
    }
    .region-header {
      background: #f0f0f0;
      padding: 8px 12px;
      font-weight: 600;
      font-size: 0.9em;
      color: #666;
      border-bottom: 1px solid #ddd;
    }
    .region-content {
      padding: 10px;
      min-height: 40px;
    }
    .component-item {
      background: #e3f2fd;
      border: 1px solid #90caf9;
      border-radius: 4px;
      padding: 10px;
      margin: 5px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .component-item .component-info {
      font-size: 0.9em;
    }
    .component-item .component-type {
      color: #1976d2;
      font-weight: 500;
    }
    .component-item .component-uuid {
      color: #999;
      font-size: 0.8em;
    }
    .component-actions form {
      display: inline;
    }
    .component-actions button {
      background: #f44336;
      color: white;
      border: none;
      padding: 4px 8px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.8em;
    }
    .add-form {
      margin: 15px 0;
      padding: 15px;
      background: #f5f5f5;
      border-radius: 8px;
    }
    .add-form select,
    .add-form input[type="text"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      margin-bottom: 10px;
    }
    .add-form button {
      width: 100%;
    }
    .empty-section {
      text-align: center;
      padding: 40px;
      color: #999;
    }
    .empty-section p {
      margin: 10px 0;
    }
    .danger-zone {
      margin-top: 30px;
      padding: 15px;
      background: #fff3f3;
      border: 1px solid #ffcdd2;
      border-radius: 8px;
    }
    .danger-zone h4 {
      color: #c62828;
      margin: 0 0 10px 0;
    }
    .meta-info {
      color: #666;
      font-size: 0.9em;
      margin: 10px 0;
    }
    .btn-danger {
      background: #f44336 !important;
      color: white;
    }
    .btn-danger:hover {
      background: #d32f2f !important;
    }
    .inline-form {
      display: inline;
    }
    .section-regions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
    }
    .preview-link {
      display: inline-block;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <nav class="admin-nav">
    <a href="/admin/layout">&larr; Back to Layout Builder</a>
  </nav>

  <main class="admin-main">
    <h1>Layout: {{contentType}}</h1>

    {{#if hasFlash}}
    <div class="flash flash-{{flash.type}}">
      {{flash.message}}
    </div>
    {{/if}}

    <p class="meta-info">
      <strong>Content Type:</strong> {{contentType}} |
      <strong>Last Updated:</strong> {{lastUpdated}} |
      <a href="/admin/layout/preview/{{contentType}}" target="_blank" class="preview-link">Preview Layout &rarr;</a>
    </p>

    <div class="layout-editor">
      <!-- Sections Panel -->
      <div class="sections-panel">
        <h2>Sections</h2>
        {{sectionsHtml}}
      </div>

      <!-- Sidebar Panel -->
      <div class="sidebar-panel">
        {{sidebarHtml}}
      </div>
    </div>
  </main>
</body>
</html>
