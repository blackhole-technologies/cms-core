<div class="login-page">
  <link rel="stylesheet" href="/public/css/admin.css">

  <div class="login-container">
    <div class="login-box">
      <h1>Login</h1>

      {{#if hasFlash}}
      <div class="flash flash-{{flash.type}}">
        {{flash.message}}
      </div>
      {{/if}}

      <form method="POST" action="/login" class="login-form">
        <div class="form-group">
          <label for="username">Username or email</label>
          <input
            type="text"
            id="username"
            name="username"
            class="form-input"
            placeholder="Enter username or email"
            required
            autofocus
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-input"
            placeholder="Enter password"
            required
          >
        </div>

        <button type="submit" class="btn btn-primary btn-block">Login</button>
      </form>

      <p class="login-footer">
        <a href="/">Back to site</a>
      </p>
    </div>
  </div>
</div>

<style>

  min-height: 100vh;

  align-items: center;
  justify-content: center;
  background: var(--gin-bg, #f5f5f5);

}

  width: 100%;
  max-width: 400px;
  padding: var(--gin-space-5, 1.25rem);
}

  background: var(--gin-surface, #fff);

  border-radius: var(--gin-radius-lg, 12px);
  box-shadow: var(--gin-shadow-lg, 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.04));
  border: 1px solid var(--gin-border-light, rgba(0,0,0,0.08));
}

.login-box h1 {
  margin: 0 0 var(--gin-space-6, 1.5rem) 0;
  text-align: center;
  font-size: var(--gin-font-size-2xl, 1.5rem);
  font-weight: var(--gin-weight-bold, 700);
  color: var(--gin-text, #222330);
  letter-spacing: -0.025em;
}

.login-form .form-group {
  margin-bottom: var(--gin-space-4, 1rem);
}

.login-form label {
  display: block;
  margin-bottom: var(--gin-space-1, 0.25rem);
  font-weight: var(--gin-weight-medium, 500);
  font-size: var(--gin-font-size-sm, 0.8125rem);
  color: var(--gin-text, #222330);
}

.login-form .form-input {
  width: 100%;
  padding: var(--gin-space-3, 0.75rem);
  border: 1px solid var(--gin-border-form, #8e929c);
  border-radius: var(--gin-radius-sm, 6px);
  font-size: var(--gin-font-size-base, 0.875rem);
  font-family: inherit;
  box-sizing: border-box;
  background: var(--gin-surface, #fff);
  color: var(--gin-text, #222330);
  transition: border-color var(--gin-transition, 150ms cubic-bezier(.19,1,.22,1)),

}

.login-footer {
  margin-top: var(--gin-space-5, 1.25rem);

.login-footer a {
  color: var(--gin-primary, #2c59ee);

</style>
