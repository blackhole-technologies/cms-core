<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>{{title}} | CMS Core Admin</title>
  <link rel="stylesheet" href="/public/css/admin.css">
  <link rel="stylesheet" href="/public/css/editor.css">
  <script>
    /* Apply saved theme + accent color before first paint to avoid flash */
    (function() {
      var theme = localStorage.getItem('cms-theme');
      if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
      var accent = localStorage.getItem('cms-accent-color');
      if (accent) {
        var r = parseInt(accent.slice(1, 3), 16);
        var g = parseInt(accent.slice(3, 5), 16);
        var b = parseInt(accent.slice(5, 7), 16);
        document.documentElement.style.setProperty('--gin-primary-rgb', r + ', ' + g + ', ' + b);
      }
    })();
  </script>
</head>
<body class="admin-page">
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <div class="admin-toolbar" role="navigation" aria-label="Primary toolbar">
    <a href="/admin" class="toolbar-logo">CMS Core</a>

    <!-- Hamburger toggle — visible only on mobile -->
    <button class="sidebar-hamburger" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>

    <div class="toolbar-spacer"></div>

    <div class="toolbar-user">
      <input type="color" class="accent-color-picker" value="#2c59ee" aria-label="Accent color" title="Choose accent color">
      <button class="dark-mode-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
        <span class="icon-sun">&#9728;</span>
        <span class="icon-moon">&#9790;</span>
      </button>
      <div class="toolbar-dropdown">
        <button type="button" class="toolbar-dropdown-trigger" aria-haspopup="true">
          <span class="toolbar-avatar" title="{{username}}">{{usernameInitial}}</span>
          <span>{{username}}</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </button>

    </div>
  </div>

  <!-- Toast container for notifications -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- AI Chatbot Widget -->
  <button class="ai-chat-fab" id="aiChatToggle" aria-label="Open AI assistant" title="AI Assistant">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
  </button>
  <div class="ai-chat-panel" id="aiChatPanel" style="display:none" role="dialog" aria-label="AI Assistant">
    <div class="ai-chat-header">
      <strong>AI Assistant</strong>
      <button class="ai-chat-close" id="aiChatClose" aria-label="Close">&times;</button>
    </div>
    <div class="ai-chat-messages" id="aiChatMessages">
      <div class="ai-chat-msg ai-chat-msg--assistant">How can I help you with your content today?</div>
    </div>
    <form class="ai-chat-input" id="aiChatForm" autocomplete="off">
      <input type="text" id="aiChatInput" placeholder="Ask anything..." aria-label="Type a message" required>
      <button type="submit" class="btn btn-primary btn-small">Send</button>
    </form>
  </div>

  <script src="/public/js/command-palette.js"></script>
  <script src="/public/js/media-modal.js"></script>
  <script src="/public/js/shortcuts.js"></script>
  <script>if(typeof Shortcuts!=='undefined')Shortcuts.init({context:'global'});</script>
  <script>
  /* AI Chatbot Widget */
  (function() {
    var toggle = document.getElementById('aiChatToggle');
    var panel = document.getElementById('aiChatPanel');
    var closeBtn = document.getElementById('aiChatClose');
    var form = document.getElementById('aiChatForm');
    var input = document.getElementById('aiChatInput');
    var messages = document.getElementById('aiChatMessages');

    if (!toggle || !panel) return;

    toggle.addEventListener('click', function() {
      var open = panel.style.display !== 'none';
      panel.style.display = open ? 'none' : 'flex';
      if (!open) input.focus();
    });

    closeBtn.addEventListener('click', function() {
      panel.style.display = 'none';
    });

    function addMsg(text, cls) {
      var div = document.createElement('div');
      div.className = 'ai-chat-msg ' + cls;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      var msg = input.value.trim();
      if (!msg) return;
      addMsg(msg, 'ai-chat-msg--user');
      input.value = '';
      input.disabled = true;

      fetch('/admin/api/ai/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ message: msg }),
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        addMsg(data.reply || data.error || 'No response.', data.error ? 'ai-chat-msg--error' : 'ai-chat-msg--assistant');
      })
      .catch(function(err) {
        addMsg('Network error: ' + err.message, 'ai-chat-msg--error');
      })
      .finally(function() {
        input.disabled = false;
        input.focus();
      });
    });
  })();
  </script>
