<div class="sdc-card-icon sdc-card-icon--{{background_color}}" style="text-align:{{text_align}}">
  <div class="sdc-card-icon__icon sdc-card-icon__icon--{{icon_size}}">{{icon}}</div>
  {{#if text}}<h3 class="sdc-card-icon__title">{{#if url}}<a href="{{url}}">{{text}}</a>{{else}}{{text}}{{/if}}</h3>{{/if}}
  {{#if description}}<div class="sdc-card-icon__desc">{{{description}}}</div>{{/if}}
</div>
