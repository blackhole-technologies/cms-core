<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} | {{site.name}}</title>
  {{#each skin.cssPaths}}
  <link rel="stylesheet" href="{{this}}">
  {{/each}}
  <style>
    /* Base layout styles */
    body {
      font-family: var(--font-family-base, 'Georgia', serif);
      background: var(--color-bg, #0a0a0f);
      color: var(--color-text, #e8e8f0);
      margin: 0;
      min-height: 100vh;
      line-height: 1.6;
    }
    
    .site-header {
      border-bottom: 1px solid var(--color-border, #2a2a3a);
      padding: 1rem 2rem;
    }
    
    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .site-logo {
      color: var(--color-primary, #d4a574);
      text-decoration: none;
      font-size: 1.25rem;
      letter-spacing: 0.05em;
    }
    
    .main-nav a {
      color: var(--color-text-dim, #888898);
      text-decoration: none;
      margin-left: 1.5rem;
    }
    
    .main-nav a:hover,
    .main-nav a.active {
      color: var(--color-primary, #d4a574);
    }
    
    .content-region {
      /* Content fills available space */
    }
    
    .site-footer {
      border-top: 1px solid var(--color-border, #2a2a3a);
      padding: 1.5rem 2rem;
      text-align: center;
      color: var(--color-text-dim, #888898);
      font-size: 0.9rem;
    }
  </style>
  {{#if extraHead}}{{{extraHead}}}{{/if}}
</head>
<body class="layout-immersive">
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="site-logo">{{site.name}}</a>
      <nav class="main-nav">
        <a href="/explore" class="active">Explore</a>
        <a href="/admin">Admin</a>
      </nav>
    </div>
  </header>
  
  <main class="content-region">
    {{{content}}}
  </main>
  
  <footer class="site-footer">
    <p>Powered by Consciousness Engine</p>
  </footer>
  
  {{#if extraScripts}}{{{extraScripts}}}{{/if}}
</body>
</html>
