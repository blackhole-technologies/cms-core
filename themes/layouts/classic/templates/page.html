<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} | {{site.name}}</title>
  {{#each skin.cssPaths}}
  <link rel="stylesheet" href="{{this}}">
  {{/each}}
  {{#if extraHead}}{{{extraHead}}}{{/if}}
</head>
<body class="layout-classic">
  {{> header}}
  
  <div class="main-wrapper">
    <main class="content-region">
      {{{content}}}
    </main>
    
    <aside class="sidebar-region">
      {{{sidebar}}}
    </aside>
  </div>
  
  {{> footer}}
  
  {{#if extraScripts}}{{{extraScripts}}}{{/if}}
</body>
</html>
